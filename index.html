<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drinks To Go</title>
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <header>
    <div class="content-wrapper">
    <h1>Drinks To Go</h1>
    </div>
  </header>
  <body>
    <div class="content-wrapper">
    <h2 class="question">How old are you?</h2>
    <input type="text" title="age" />
    <button type="button">Submit</button>
    <p class="message"></p>
    <ul class="alcoholic-drinks hide">
        <li>beer</li>
        <li>craft beer</li>
        <li>white wine</li>
        <li>red wine</li>
        <li>cider</li>
    </ul>
    <ul class="soft-drinks hide">
        <li>lemonade</li>
        <li>pink lemonade</li>
        <li>cherry soda</li>
        <li>lemon soda</li>
        <li>hot chocolate</li>
        <li>chocolate milk</li>
    </ul>
    </div>
  </body>
</html>
